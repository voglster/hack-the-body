# Development compose. Builds locally from source.
# For production, see compose/docker-compose.yml (pulls from GHCR).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: ${MONGO_URL}
      MONGO_DB: ${MONGO_DB}
      API_KEY: ${API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TZ: ${TZ}
      OLLAMA_URL: ${OLLAMA_URL:-http://10.0.6.46:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-glm-4.7-flash:latest}
      COACH_SCHEDULE_LOCAL: ${COACH_SCHEDULE_LOCAL:-07:00,12:00,17:00}
      VITAMIN_REMINDER_LOCAL: ${VITAMIN_REMINDER_LOCAL:-10:00}
      WEEKLY_OLLAMA_URL: ${WEEKLY_OLLAMA_URL:-http://10.0.6.45:11434}
      WEEKLY_OLLAMA_MODEL: ${WEEKLY_OLLAMA_MODEL:-gpt-oss:120b}
      WEEKLY_TIMEOUT_S: ${WEEKLY_TIMEOUT_S:-600}
      COACH_WEEKLY_LOCAL: ${COACH_WEEKLY_LOCAL:-21:00}
      USDA_FDC_API_KEY: ${USDA_FDC_API_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:hack-the-body@local}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    ports:
      - "${APP_PORT:-8080}:8000"

  ingestor-garmin:
    build:
      context: .
      dockerfile: services/ingestor-garmin/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: ${MONGO_URL}
      MONGO_DB: ${MONGO_DB}
      GARMIN_EMAIL: ${GARMIN_EMAIL}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD}
      GARMIN_SESSION_DIR: ${GARMIN_SESSION_DIR}
      GARMIN_BACKFILL_DAYS: ${GARMIN_BACKFILL_DAYS}
      GARMIN_SCHEDULE_CRON: ${GARMIN_SCHEDULE_CRON}
      TZ: ${TZ}
    volumes:
      - garmin_session:/data/garmin-session

volumes:
  mongo_data:
  garmin_session:
