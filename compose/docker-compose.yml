# Production compose for Hack the Body.
# Drop this on a host as `~/compose/hack-the-body/docker-compose.yml`,
# put a `.env` next to it (see compose/.env.example), and `docker compose up -d`.
#
# Watchtower (running in `~/compose/watchtower/` on the host) auto-updates any
# container labeled `com.centurylinklabs.watchtower.enable=true`. The `app` and
# `ingestor-garmin` services below are labeled; `mongo` is not (we never want
# watchtower restarting the database mid-write).

services:
  mongo:
    image: mongo:7
    container_name: hack-the-body-mongo
    restart: unless-stopped
    volumes:
      - ./data/mongo:/data/db
    networks:
      - htb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/voglster/hack-the-body-app:latest
    container_name: hack-the-body-app
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: hackthebody
      API_KEY: ${API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TZ: ${TZ:-America/Denver}
      OLLAMA_URL: ${OLLAMA_URL:-http://10.0.6.46:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-glm-4.7-flash:latest}
      COACH_SCHEDULE_LOCAL: ${COACH_SCHEDULE_LOCAL:-07:00,12:00,17:00}
      VITAMIN_REMINDER_LOCAL: ${VITAMIN_REMINDER_LOCAL:-10:00}
      WEEKLY_OLLAMA_URL: ${WEEKLY_OLLAMA_URL:-http://10.0.6.45:11434}
      WEEKLY_OLLAMA_MODEL: ${WEEKLY_OLLAMA_MODEL:-gpt-oss:120b}
      WEEKLY_TIMEOUT_S: ${WEEKLY_TIMEOUT_S:-600}
      COACH_WEEKLY_LOCAL: ${COACH_WEEKLY_LOCAL:-21:00}
      USDA_FDC_API_KEY: ${USDA_FDC_API_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:hack-the-body@local}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    ports:
      - "${APP_PORT:-8080}:8000"
    networks:
      - htb

  ingestor-garmin:
    image: ghcr.io/voglster/hack-the-body-ingestor-garmin:latest
    container_name: hack-the-body-ingestor
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: hackthebody
      GARMIN_EMAIL: ${GARMIN_EMAIL}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD}
      GARMIN_SESSION_DIR: /data/garmin-session
      GARMIN_BACKFILL_DAYS: ${GARMIN_BACKFILL_DAYS:-90}
      GARMIN_SCHEDULE_CRON: ${GARMIN_SCHEDULE_CRON:-0 4 * * *}
      TZ: ${TZ:-America/Denver}
    volumes:
      - ./data/garmin-session:/data/garmin-session
    networks:
      - htb

networks:
  htb:
    driver: bridge
