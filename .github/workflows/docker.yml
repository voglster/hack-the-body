name: Build & Push Docker Images

on:
  push:
    branches: ['master', 'main']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      ingestor: ${{ steps.filter.outputs.ingestor }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'services/api/**'
              - 'services/web/**'
            ingestor:
              - 'services/ingestor-garmin/**'

  build-app:
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lowercase owner for Docker tags
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app image (FastAPI + bundled FE)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/hack-the-body-app:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/hack-the-body-app:${{ github.sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  build-ingestor:
    needs: changes
    if: needs.changes.outputs.ingestor == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lowercase owner for Docker tags
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ingestor-garmin image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/ingestor-garmin/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/hack-the-body-ingestor-garmin:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/hack-the-body-ingestor-garmin:${{ github.sha }}
          cache-from: type=gha,scope=ingestor
          cache-to: type=gha,mode=max,scope=ingestor
